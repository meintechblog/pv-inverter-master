<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venus OS Fronius Proxy</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --text-dim: #8888aa;
      --accent: #e94560;
      --green: #00c853;
      --red: #ff1744;
      --yellow: #ffab00;
      --mono: 'Courier New', monospace;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: var(--accent);
      margin: 0 0 20px;
    }
    h2 {
      color: var(--text);
      font-size: 1.1em;
      margin: 0 0 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      background: var(--text-dim);
    }
    .status-dot.green { background: var(--green); }
    .status-dot.red { background: var(--red); }
    .status-dot.yellow { background: var(--yellow); }
    .health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .health-grid label {
      display: block;
      color: var(--text-dim);
      font-size: 0.85em;
    }
    .health-grid span {
      font-family: var(--mono);
      font-size: 1.1em;
    }
    form input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      width: 100%;
      max-width: 300px;
    }
    .form-group {
      margin: 8px 0;
    }
    .form-group label {
      display: block;
      color: var(--text-dim);
      font-size: 0.85em;
      margin-bottom: 4px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    #btn-test {
      background: var(--border);
      color: var(--text);
    }
    #btn-save {
      background: var(--accent);
      color: white;
    }
    .message {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.9em;
      display: none;
    }
    .message.success {
      display: block;
      background: #1b3a1b;
      color: var(--green);
    }
    .message.error {
      display: block;
      background: #3a1b1b;
      color: var(--red);
    }
    .model-group {
      margin: 8px 0;
    }
    .model-header {
      cursor: pointer;
      padding: 8px;
      background: var(--bg);
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
    }
    .model-header:hover {
      background: var(--border);
    }
    .model-fields {
      padding: 0;
    }
    .model-fields.collapsed {
      display: none;
    }
    .reg-header {
      display: grid;
      grid-template-columns: 80px 1fr minmax(160px, 1.2fr) minmax(160px, 1.2fr);
      padding: 4px 8px;
      font-size: 0.8em;
      color: var(--text-dim);
      border-bottom: 2px solid var(--border);
    }
    .reg-row {
      display: grid;
      grid-template-columns: 80px 1fr minmax(160px, 1.2fr) minmax(160px, 1.2fr);
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.85em;
    }
    .reg-row:hover {
      background: var(--bg);
    }
    .reg-addr {
      color: var(--text-dim);
    }
    .reg-name {
      color: var(--text);
    }
    .reg-se-value {
      text-align: right;
      color: var(--text-dim);
      word-break: break-all;
      overflow-wrap: break-word;
    }
    .reg-fronius-value {
      text-align: right;
      color: var(--text);
      word-break: break-all;
      overflow-wrap: break-word;
    }
    .reg-se-value.null-value {
      color: var(--border);
    }
    @keyframes flash {
      0% { background-color: var(--accent); }
      100% { background-color: transparent; }
    }
    .changed {
      animation: flash 0.5s ease-out;
    }
  </style>
</head>
<body>
  <header><h1>Venus OS Fronius Proxy</h1></header>

  <!-- Status Section -->
  <section id="status">
    <h2>Connection Status</h2>
    <div class="status-row">
      <span class="status-dot" id="se-dot"></span>
      <span id="se-label">SolarEdge: --</span>
    </div>
    <div class="status-row">
      <span class="status-dot" id="vos-dot"></span>
      <span id="vos-label">Venus OS: --</span>
    </div>
  </section>

  <!-- Health Section -->
  <section id="health">
    <h2>Service Health</h2>
    <div class="health-grid">
      <div><label>Uptime</label><span id="uptime">--</span></div>
      <div><label>Poll Success Rate</label><span id="poll-rate">--</span></div>
      <div><label>Last Poll</label><span id="last-poll">--</span></div>
      <div><label>Cache</label><span id="cache-status">--</span></div>
    </div>
  </section>

  <!-- Config Section -->
  <section id="config">
    <h2>Inverter Configuration</h2>
    <form id="config-form">
      <div class="form-group">
        <label for="se-host">SolarEdge IP</label>
        <input type="text" id="se-host" placeholder="192.168.3.18">
      </div>
      <div class="form-group">
        <label for="se-port">Modbus Port</label>
        <input type="number" id="se-port" placeholder="1502" min="1" max="65535">
      </div>
      <div class="form-group">
        <label for="se-unit">Unit ID</label>
        <input type="number" id="se-unit" placeholder="1" min="1" max="247">
      </div>
      <div class="button-group">
        <button type="button" id="btn-test">Test Connection</button>
        <button type="submit" id="btn-save">Save &amp; Apply</button>
      </div>
      <div id="config-message" class="message"></div>
    </form>
  </section>

  <!-- Register Viewer Section -->
  <section id="registers">
    <h2>Register Viewer</h2>
    <div id="register-models"></div>
  </section>

  <script>
    const POLL_INTERVAL = 2000;
    let previousRegValues = {};

    // -- Status polling --
    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const seDot = document.getElementById('se-dot');
        const seLabel = document.getElementById('se-label');
        seDot.className = 'status-dot';
        if (data.reconfiguring) {
          seDot.classList.add('yellow');
          seLabel.textContent = 'SolarEdge: Reconnecting...';
        } else if (data.solaredge === 'connected') {
          seDot.classList.add('green');
          seLabel.textContent = 'SolarEdge: Connected';
        } else if (data.solaredge === 'night_mode') {
          seDot.classList.add('yellow');
          seLabel.textContent = 'SolarEdge: Night Mode';
        } else {
          seDot.classList.add('red');
          seLabel.textContent = 'SolarEdge: ' + (data.solaredge || 'Disconnected');
        }
        const vosDot = document.getElementById('vos-dot');
        const vosLabel = document.getElementById('vos-label');
        vosDot.className = 'status-dot';
        if (data.venus_os === 'active') {
          vosDot.classList.add('green');
          vosLabel.textContent = 'Venus OS: Active';
        } else {
          vosDot.classList.add('yellow');
          vosLabel.textContent = 'Venus OS: ' + (data.venus_os || 'Unknown');
        }
      } catch (e) { console.error('Status poll failed:', e); }
    }

    // -- Health polling --
    async function pollHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const hrs = Math.floor(data.uptime_seconds / 3600);
        const mins = Math.floor((data.uptime_seconds % 3600) / 60);
        document.getElementById('uptime').textContent = hrs + 'h ' + mins + 'm';
        document.getElementById('poll-rate').textContent = data.poll_success_rate.toFixed(1) + '%';
        if (data.last_poll_age !== null) {
          document.getElementById('last-poll').textContent = data.last_poll_age.toFixed(0) + 's ago';
        } else {
          document.getElementById('last-poll').textContent = 'No data';
        }
        document.getElementById('cache-status').textContent = data.cache_stale ? 'STALE' : 'Fresh';
        document.getElementById('cache-status').style.color = data.cache_stale ? 'var(--red)' : 'var(--green)';
      } catch (e) { console.error('Health poll failed:', e); }
    }

    // -- Config loading --
    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        document.getElementById('se-host').value = data.host;
        document.getElementById('se-port').value = data.port;
        document.getElementById('se-unit').value = data.unit_id;
      } catch (e) { console.error('Config load failed:', e); }
    }

    // -- Test connection --
    document.getElementById('btn-test').addEventListener('click', async () => {
      const msg = document.getElementById('config-message');
      msg.className = 'message';
      msg.style.display = 'block';
      msg.textContent = 'Testing connection...';
      msg.style.color = 'var(--text-dim)';
      msg.style.background = 'var(--bg)';
      try {
        const res = await fetch('/api/config/test', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            host: document.getElementById('se-host').value,
            port: parseInt(document.getElementById('se-port').value),
            unit_id: parseInt(document.getElementById('se-unit').value)
          })
        });
        const data = await res.json();
        msg.className = 'message ' + (data.success ? 'success' : 'error');
        msg.textContent = data.success ? 'Connection successful!' : 'Connection failed: ' + data.error;
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Test request failed: ' + e.message;
      }
    });

    // -- Save config --
    document.getElementById('config-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('config-message');
      msg.className = 'message';
      msg.style.display = 'block';
      msg.textContent = 'Saving...';
      msg.style.color = 'var(--text-dim)';
      msg.style.background = 'var(--bg)';
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            host: document.getElementById('se-host').value,
            port: parseInt(document.getElementById('se-port').value),
            unit_id: parseInt(document.getElementById('se-unit').value)
          })
        });
        const data = await res.json();
        msg.className = 'message ' + (data.success ? 'success' : 'error');
        msg.textContent = data.success ? 'Saved and applied!' : 'Save failed: ' + data.error;
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Save request failed: ' + e.message;
      }
    });

    // -- Register viewer (SIDE-BY-SIDE: SE30K source | Fronius target) --
    async function pollRegisters() {
      try {
        const res = await fetch('/api/registers');
        const models = await res.json();
        const container = document.getElementById('register-models');
        if (container.children.length === 0) {
          buildRegisterViewer(container, models);
        } else {
          updateRegisterValues(models);
        }
      } catch (e) { console.error('Register poll failed:', e); }
    }

    function buildRegisterViewer(container, models) {
      models.forEach((model, idx) => {
        const group = document.createElement('div');
        group.className = 'model-group';
        const header = document.createElement('div');
        header.className = 'model-header';
        header.innerHTML = '<span>' + model.name + '</span><span>&#9660;</span>';
        header.addEventListener('click', () => {
          const fields = group.querySelector('.model-fields');
          fields.classList.toggle('collapsed');
          header.querySelector('span:last-child').textContent = fields.classList.contains('collapsed') ? '\u25B6' : '\u25BC';
        });
        group.appendChild(header);

        const fields = document.createElement('div');
        fields.className = 'model-fields';

        // Column header row: Addr | Name | SE30K Source | Fronius Target
        const headerRow = document.createElement('div');
        headerRow.className = 'reg-header';
        headerRow.innerHTML = '<span>Addr</span><span>Name</span><span>SE30K Source</span><span>Fronius Target</span>';
        fields.appendChild(headerRow);

        model.fields.forEach(field => {
          const row = document.createElement('div');
          row.className = 'reg-row';
          row.id = 'reg-' + field.addr;

          const seVal = formatValue(field.se_value);
          const frVal = formatValue(field.fronius_value);
          const seClass = field.se_value === null ? 'reg-se-value null-value' : 'reg-se-value';

          row.innerHTML =
            '<span class="reg-addr">' + field.addr + '</span>' +
            '<span class="reg-name">' + field.name + '</span>' +
            '<span class="' + seClass + '" id="se-val-' + field.addr + '">' + seVal + '</span>' +
            '<span class="reg-fronius-value" id="fr-val-' + field.addr + '">' + frVal + '</span>';
          fields.appendChild(row);
          previousRegValues[field.addr] = {se: field.se_value, fr: field.fronius_value};
        });
        group.appendChild(fields);
        container.appendChild(group);
      });
    }

    function updateRegisterValues(models) {
      models.forEach(model => {
        model.fields.forEach(field => {
          const seEl = document.getElementById('se-val-' + field.addr);
          const frEl = document.getElementById('fr-val-' + field.addr);
          let changed = false;

          if (seEl) {
            const newSeVal = formatValue(field.se_value);
            if (seEl.textContent !== newSeVal) {
              seEl.textContent = newSeVal;
              changed = true;
            }
            // Update class for null/non-null state
            seEl.className = field.se_value === null ? 'reg-se-value null-value' : 'reg-se-value';
          }
          if (frEl) {
            const newFrVal = formatValue(field.fronius_value);
            if (frEl.textContent !== newFrVal) {
              frEl.textContent = newFrVal;
              changed = true;
            }
          }

          if (changed) {
            const row = document.getElementById('reg-' + field.addr);
            if (row) {
              row.classList.remove('changed');
              void row.offsetWidth; // force reflow for re-animation
              row.classList.add('changed');
            }
          }
          previousRegValues[field.addr] = {se: field.se_value, fr: field.fronius_value};
        });
      });
    }

    function formatValue(val) {
      if (val === null || val === undefined) return '--';
      if (typeof val === 'string') return val;
      return val.toString();
    }

    // -- Initial load + polling --
    loadConfig();
    pollStatus();
    pollHealth();
    pollRegisters();
    setInterval(() => { pollStatus(); pollHealth(); pollRegisters(); }, POLL_INTERVAL);
  </script>
</body>
</html>
